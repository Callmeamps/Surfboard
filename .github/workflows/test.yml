name: Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  # Unit tests — split into 2 jobs to stay under 7GB runner RAM
  test-a:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - run: npm ci
      - name: Run unit tests (group A)
        run: |
          NODE_OPTIONS='--max-old-space-size=4096 --expose-gc' ./node_modules/.bin/jest --verbose --runInBand --forceExit \
            --testPathPatterns='test/(actions|ai-client|browser-shell|canvas-pages|cloud-manager|cookie-manager)\.test\.js'

  test-a2:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - run: npm ci
      - name: Run unit tests (group A2)
        run: |
          NODE_OPTIONS='--max-old-space-size=4096 --expose-gc' ./node_modules/.bin/jest --verbose --runInBand --forceExit \
            --testPathPatterns='test/(data-pipeline|download-manager|editor-engine)\.test\.js'

  test-b:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - run: npm ci
      - name: Run unit tests (group B)
        run: |
          NODE_OPTIONS='--max-old-space-size=4096 --expose-gc' ./node_modules/.bin/jest --verbose --runInBand --forceExit \
            --testPathPatterns='test/(extension-loader|inspector|ipc-shell|ipc-tab-order|links-dashboard|miniapps|mode-manager|papertm-drag|papertm-minimap)\.test\.js'

  test-c:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - run: npm ci
      - name: Run unit tests (group C)
        run: |
          NODE_OPTIONS='--max-old-space-size=4096 --expose-gc' ./node_modules/.bin/jest --verbose --runInBand --forceExit \
            --testPathPatterns='test/(pdf-viewer|profiles|renderer-webviews|right-sidebar|session-persistence|settings-page|shortcut-menu|ssh-manager|storage|tab-groups|tab-lifecycle|tab-manager|tab-pages|trust-manager|workflows)\.test\.js'

  # Build distributables
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-a, test-a2, test-b, test-c]
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - name: Install system deps for Electron
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils \
            libatspi2.0-0 libdrm2 libgbm1 libxcb-dri3-0
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: surfboard-linux-unpacked
          path: dist/linux-unpacked/**
          if-no-files-found: error

  # Jest integration tests (launch real Electron)
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test-a, test-a2, test-b, test-c]
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - name: Install system deps for Electron
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils \
            libatspi2.0-0 libdrm2 libgbm1 libxcb-dri3-0 \
            xvfb
      - name: Run integration tests
        run: |
          xvfb-run --auto-servernum npm run test:e2e
        env:
          DISPLAY: :99

  # E2E smoke test (requires Xvfb for Electron)
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-a, test-a2, test-b, test-c]
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - name: Install system deps for Electron
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils \
            libatspi2.0-0 libdrm2 libgbm1 libxcb-dri3-0 \
            xvfb
      - name: Run E2E smoke test
        run: |
          xvfb-run --auto-servernum mise run e2e
        env:
          DISPLAY: :99
