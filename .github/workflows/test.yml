name: Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  # ── Heavy tests (need feature-platform setup) ──────────────
  # Split into small groups — setup evals 8 modules, stays in memory
  test-heavy-1:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - run: npm ci
      - name: Run heavy tests (actions, ai-client)
        run: |
          NODE_OPTIONS='--max-old-space-size=4096 --expose-gc' ./node_modules/.bin/jest --verbose --runInBand --forceExit \
            --testPathPatterns='test/(actions|ai-client)\.test\.js'

  test-heavy-2:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - run: npm ci
      - name: Run heavy tests (data-pipeline)
        run: |
          NODE_OPTIONS='--max-old-space-size=4096 --expose-gc' ./node_modules/.bin/jest --verbose --runInBand --forceExit \
            --testPathPatterns='test/data-pipeline\.test\.js'
  test-heavy-2b:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - run: npm ci
      - name: Run heavy tests (download-manager)
        run: |
          NODE_OPTIONS='--max-old-space-size=4096 --expose-gc' ./node_modules/.bin/jest --verbose --runInBand --forceExit \
            --config jest.light.config.js \
            --testPathPatterns='test/download-manager\.test\.js'

  test-heavy-3:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - run: npm ci
      - name: Run heavy tests (editor-engine)
        run: |
          NODE_OPTIONS='--max-old-space-size=4096 --expose-gc' ./node_modules/.bin/jest --verbose --runInBand --forceExit \
            --testPathPatterns='test/editor-engine\.test\.js'

  test-heavy-4:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - run: npm ci
      - name: Run heavy tests (inspector, mode-manager)
        run: |
          NODE_OPTIONS='--max-old-space-size=4096 --expose-gc' ./node_modules/.bin/jest --verbose --runInBand --forceExit \
            --testPathPatterns='test/(inspector|mode-manager)\.test\.js'

  test-heavy-5:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - run: npm ci
      - name: Run heavy tests (miniapps, trust-manager, workflows)
        run: |
          NODE_OPTIONS='--max-old-space-size=4096 --expose-gc' ./node_modules/.bin/jest --verbose --runInBand --forceExit \
            --testPathPatterns='test/(miniapps|trust-manager|workflows)\.test\.js'

  # ── Light tests (no feature-platform setup) ────────────────
  # Can run together — no heavy eval'd modules
  test-light-a:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - run: npm ci
      - name: Run light tests (batch A)
        run: |
          NODE_OPTIONS='--max-old-space-size=4096 --expose-gc' ./node_modules/.bin/jest --verbose --runInBand --forceExit \
            --config jest.light.config.js \
            --testPathPatterns='test/(browser-shell|canvas-pages|cloud-manager|cookie-manager|extension-loader)\.test\.js'
  test-light-b:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - run: npm ci
      - name: Run light tests (batch B)
        run: |
          NODE_OPTIONS='--max-old-space-size=4096 --expose-gc' ./node_modules/.bin/jest --verbose --runInBand --forceExit \
            --config jest.light.config.js \
            --testPathPatterns='test/(ipc-shell|ipc-tab-order|links-dashboard|papertm-drag|papertm-minimap|pdf-viewer)\.test\.js'
  test-light-c:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - run: npm ci
      - name: Run light tests (batch C)
        run: |
          NODE_OPTIONS='--max-old-space-size=4096 --expose-gc' ./node_modules/.bin/jest --verbose --runInBand --forceExit \
            --config jest.light.config.js \
            --testPathPatterns='test/(profiles|renderer-webviews|right-sidebar|session-persistence|settings-page|shortcut-menu)\.test\.js'
  test-light-d:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - run: npm ci
      - name: Run light tests (batch D)
        run: |
          NODE_OPTIONS='--max-old-space-size=4096 --expose-gc' ./node_modules/.bin/jest --verbose --runInBand --forceExit \
            --config jest.light.config.js \
            --testPathPatterns='test/(ssh-manager|storage|tab-groups|tab-lifecycle|tab-manager|tab-pages)\.test\.js'

  # ── Build ──────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-heavy-1, test-heavy-2, test-heavy-2b, test-heavy-3, test-heavy-4, test-heavy-5, test-light-a, test-light-b, test-light-c, test-light-d]
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - name: Install system deps for Electron
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils \
            libatspi2.0-0 libdrm2 libgbm1 libxcb-dri3-0
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: surfboard-linux-unpacked
          path: dist/linux-unpacked/**
          if-no-files-found: error

  # ── Integration tests (launch real Electron) ───────────────
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test-heavy-1, test-heavy-2, test-heavy-2b, test-heavy-3, test-heavy-4, test-heavy-5, test-light-a, test-light-b, test-light-c, test-light-d]
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - name: Install system deps for Electron
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils \
            libatspi2.0-0 libdrm2 libgbm1 libxcb-dri3-0 \
            xvfb
      - name: Run integration tests
        run: |
          xvfb-run --auto-servernum npm run test:e2e
        env:
          DISPLAY: :99

  # ── E2E smoke test ─────────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-heavy-1, test-heavy-2, test-heavy-2b, test-heavy-3, test-heavy-4, test-heavy-5, test-light-a, test-light-b, test-light-c, test-light-d]
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - name: Install system deps for Electron
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils \
            libatspi2.0-0 libdrm2 libgbm1 libxcb-dri3-0 \
            xvfb
      - name: Run E2E smoke test
        run: |
          xvfb-run --auto-servernum mise run e2e
        env:
          DISPLAY: :99
