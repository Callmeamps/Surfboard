name: Setup Node + deps
description: Checkout, install mise + node, npm ci with cache

inputs:
  node-version:
    description: Node version override
    default: '22'

runs:
  using: composite
  steps:
    - name: Cache mise
      uses: actions/cache@v4
      with:
        path: ~/.local/share/mise
        key: mise-${{ runner.os }}-${{ inputs.node-version }}
        restore-keys: mise-${{ runner.os }}-

    - uses: jdx/mise-action@v3
      with:
        install: false

    - name: Cache node_modules
      uses: actions/cache@v4
      with:
        path: node_modules
        key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
        restore-keys: npm-${{ runner.os }}-

    - run: npm ci --prefer-offline
      shell: bash
